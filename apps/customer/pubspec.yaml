name: customer
description: FaB-O2O Customer App - Order food, call ride, scan QR

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  loading_animation_widget: ^1.3.0
  dio: ^5.9.0
  dio_smart_retry: ^7.0.1
  path_provider: ^2.1.5
  pretty_dio_logger: ^1.4.0
  http_cache_hive_store: ^5.0.1
  dio_cache_interceptor: ^4.0.5
  flutter_secure_storage: ^9.2.4
  apptomate_custom_checkbox: ^0.0.2
  get_it: ^9.0.5
  fast_cached_network_image: ^1.3.3+5
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  infinite_scroll_pagination: ^5.1.1
  crypto: ^3.0.7
  go_router: ^17.0.0
  flutter_riverpod: ^2.5.1
  carousel_slider: ^5.1.1
  skeletonizer: ^2.1.0+1
  flutter_slidable: ^4.0.3
  diacritic: ^0.1.6
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  webview_flutter: ^4.13.0
  image_picker: ^1.2.1
  qr_flutter: ^4.1.0
  iconsax_flutter: ^1.0.1
  socket_io_client: ^3.1.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_web_auth_2: ^4.1.0
  file_picker: ^10.3.7
  image_cropper: ^11.0.0
  keyboard_actions: ^4.2.1
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.4
  uuid: ^4.5.2
  toastification: ^3.0.3
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  geolocator: ^14.0.2
  mobile_scanner: ^7.2.0
  maplibre_gl: ^0.25.0
  lottie: ^3.3.2
  scrollable_positioned_list: ^0.3.8
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.5

  # Linting
  flutter_lints: ^5.0.0

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/



fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter_18pt-Black.ttf
        weight: 900
      - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
        weight: 800
      - asset: assets/fonts/Inter_18pt-Bold.ttf
        weight: 700
      - asset: assets/fonts/Inter_18pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Inter_18pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/Inter_18pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/Inter_18pt-Light.ttf
        weight: 300
